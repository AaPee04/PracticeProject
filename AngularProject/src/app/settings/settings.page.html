<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Display</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list-header>Appearance</ion-list-header>
  <ion-list inset="true">

    <ion-item button="true">
      <ion-label>Text Size</ion-label>
      <ion-range
        [ticks]="true"
        [snaps]="true"
        [min]="0"
        [max]="2"
        [value]="theme.getFontSizeMode()"
        (ionChange)="onFontSizeChange($event)">
      </ion-range>
    </ion-item>

    <ion-item>
      <ion-label>Bold Text</ion-label>
      <ion-toggle
        slot="end"
        [checked]="theme.isBold()"
        (ionChange)="onBoldToggle()">
      </ion-toggle>
    </ion-item>

    <ion-item lines="full">
      <ion-label>Tumma tila</ion-label>
      <ion-toggle
        slot="end"
        [checked]="theme.isDark()"
        (ionChange)="onThemeToggle()">
      </ion-toggle>
    </ion-item>

  </ion-list>

  <ion-list-header>Debug</ion-list-header>
  <ion-list inset="true">
    <ion-item>
      <pre>{{ debugInfo }}</pre>
    </ion-item>
  </ion-list>

</ion-content>
